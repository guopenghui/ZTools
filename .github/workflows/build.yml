name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '预发布版本号，例如 3.0.0-beta.1'
        required: true
      prerelease:
        description: '是否发布为 GitHub Pre-release'
        type: boolean
        default: true
      publish_release:
        description: '是否发布到 GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x64 (Intel, available until Aug 2027)
          - os: macos-15-intel
            arch: x64
            build_cmd: pnpm run build:mac:x64
            # electron-builder expects the certificate subject without its type prefix.
            signing_identity: 'Zhengzhou Zhongsen Yunke Information Technology Co., Ltd. (4S4HH8375U)'
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            arch: arm64
            build_cmd: pnpm run build:mac:arm64
            signing_identity: 'Zhengzhou Zhongsen Yunke Information Technology Co., Ltd. (4S4HH8375U)'
          # Windows x64
          - os: windows-latest
            arch: x64
            build_cmd: pnpm run build:win
            signing_identity: ''

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION#v}"
            prerelease="${INPUT_PRERELEASE:-true}"
          else
            version="${GITHUB_REF_NAME#v}"
            prerelease="false"
          fi

          if [ -z "$version" ]; then
            echo "Release version is required" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$([ "$prerelease" = "true" ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Set package version
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install plugin dependencies
        run: |
          cd internal-plugins/setting
          pnpm install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare App Store Connect API key
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          # Decode the secret only into the ephemeral runner workspace.
          node -e 'const fs=require("fs"); fs.writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"))' "$key_path"

          test -s "$key_path"
          grep -q 'BEGIN PRIVATE KEY' "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      # 统一构建命令
      - name: Build and Package
        env:
          CSC_LINK: ${{ startsWith(matrix.os, 'macos') && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos') && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          CSC_NAME: ${{ matrix.signing_identity }}
          APPLE_API_KEY_ID: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_API_ISSUER || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_TEAM_ID || '' }}
        run: ${{ matrix.build_cmd }}

      - name: Verify macOS signature and notarization
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo 'No macOS app bundle found in dist/' >&2
            exit 1
          fi

          # Verify the complete nested bundle before artifacts are uploaded.
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

      # 上传平台产物（只上传指定文件类型）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    name: Release
    needs: build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_release }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION#v}"
            prerelease="${INPUT_PRERELEASE:-true}"
          else
            version="${GITHUB_REF_NAME#v}"
            prerelease="false"
          fi

          if [ -z "$version" ]; then
            echo "Release version is required" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$([ "$prerelease" = "true" ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Set package version
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-macos-15-intel-x64
          path: dist

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-macos-14-arm64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-windows-latest-x64
          path: dist

      # 生成下载链接；latest.yml 等标准更新元数据来自 Windows 构建产物
      - name: Generate update info
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: pnpm updater

      # 只上传指定的三类文件到 Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.tag }}
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          body_path: changelog.md
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/latest.yml

