appId: top.z-tools
productName: ZTools
publish:
  provider: github
  owner: ZToolsCenter
  repo: ZTools
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!**/.DS_Store'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml}'
  - '!{CHANGELOG.md,changelog.md,README.md,README_EN.md,CONTRIBUTING.md,CLAUDE.md}'
  - '!{.env,.env.*,.npmrc,.gitmodules,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.*.tsbuildinfo,vitest.config.*}'
  - '!{.claude/**,.githooks/**,.github/**}'
  - '!docs/**'
  - '!tests/**'
  - '!updater/**'
  - '!ztools-api-types/**'
  - '!ztools-plugin-cli/**'
  - '!scripts/**'
  - '!internal-plugins/**'
asarUnpack:
  - resources/**
  - '**/node_modules/sharp/**/*'
  - '**/node_modules/@img/**/*'
fileAssociations:
  - ext: zpx
    name: ZTools Plugin
    description: ZTools Plugin Package
    role: Viewer
win:
  executableName: ZTools
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-${os}-${arch}-setup.${ext}
  include: build/installer.nsh
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: false
mac:
  # The Developer ID identity is selected by CSC_NAME in CI. Leaving this
  # unset keeps local builds compatible with machines that have no certificate.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  target:
    - dmg
    - zip
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
dmg:
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}-${os}-${arch}.${ext}
npmRebuild: false

afterPack: ./build/afterPack.js
